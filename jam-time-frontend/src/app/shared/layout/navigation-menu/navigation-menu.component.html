<mat-nav-list>

  @for (item of navigationMenuItems; track item) {
    <h3 mat-subheader>{{ item.text }}</h3>
    @for (child of item.children; track child) {
      <a mat-list-item [routerLink]="[child.routerLink]">
        <mat-icon matListItemIcon>
          {{ child.icon }}
        </mat-icon>
        {{ child.text }}
      </a>
    }
  }

</mat-nav-list>
